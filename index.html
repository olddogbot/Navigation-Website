    @keyframes gradient-flow {

    }

    .divider {
      width: 100px;
      height: 2px;

    }

    .content-list {

    .content-list li a {

      color: #fff;
      text-decoration: none;
      padding: 15px 20px;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .content-list li a::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,249,0.1), transparent);
      transition: left 0.5s ease;
    }

    .content-list li a:hover::before {
      left: 100%;
    }

    .content-list li a:hover {
      background: rgba(0,255,249,0.1);
      border-color: #00fff9;
      transform: translateX(5px);
      box-shadow: 0 0 20px rgba(0,255,249,0.2);
    }

    .content-list li a .icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00fff9, #ff00ff);

    .btn-group {

    .footer {
